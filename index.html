<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Manor V3 — 预览 & 下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
background:#0b1220;color:#e2e8f0;overflow:hidden;height:100vh}
#canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;z-index:0}
#canvas:active{cursor:grabbing}
.card{position:fixed;z-index:10;background:rgba(15,23,42,.88);backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 20px}
#info{top:16px;left:16px;max-width:340px}
#info h1{font-size:22px;color:#4ade80;margin-bottom:4px}
#info .sub{font-size:13px;color:#94a3b8;margin-bottom:10px}
#info .spec{font-size:13px;line-height:1.8;color:#cbd5e1} #info .spec b{color:#4ade80}
#dl{top:16px;right:16px;display:flex;flex-direction:column;gap:10px;width:200px}
.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;border-radius:10px;
border:none;cursor:pointer;font-weight:600;font-size:15px;color:#fff;
transition:transform .15s,box-shadow .15s;font-family:inherit}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.35)}
.btn .fmt{font-size:11px;font-weight:400;opacity:.85;margin-top:1px}
.btn-obj{background:#22c55e;color:#052e16}.btn-mtl{background:#3b82f6}.btn-3dm{background:#f59e0b;color:#3a2606}
#bar-wrap{position:fixed;z-index:10;top:50%;left:50%;transform:translate(-50%,-50%);
background:rgba(15,23,42,.92);padding:24px 32px;border-radius:16px;border:1px solid rgba(255,255,255,.12);
text-align:center;min-width:320px;display:none}
#bar-wrap .pct{font-size:28px;font-weight:700;color:#4ade80;margin:8px 0 4px}
#bar-wrap .msg{font-size:13px;color:#94a3b8}
.progress-bg{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:4px;width:0%;transition:width .2s}
#tip{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
background:rgba(15,23,42,.85);color:#94a3b8;font-size:13px;padding:8px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="card" id="info">
<h1>🌿 Mini Manor V3</h1>
<p class="sub">曲面弧形镂空围墙 · 预览 &amp; 下载</p>
<div class="spec"><b>414</b> 个绿色空心种植箱砌块<br><b>23</b> 层镜像对称 · 顶层收 1 块<br>每块 900×220×180mm（壁厚35）<br>全部重叠相连</div>
</div>

<div class="card" id="dl">
<button class="btn btn-obj" onclick="dl('curved_wall_mini_manor_v3.obj','MiniManor.obj')">
⬇ OBJ 模型<span class="fmt">.obj · 1.3MB</span></button>
<button class="btn btn-mtl" onclick="dl('curved_wall_mini_manor_v3.mtl','MiniManor.mtl')">
⬇ 材质 MTL<span class="fmt">.mtl · 绿色</span></button>
<button class="btn btn-3dm" onclick="dl('curved_wall_mini_manor_v3.3dm','MiniManor.3dm')">
⬇ Rhino源文件<span class="fmt">.3dm · 11MB</span></button>
</div>

<div id="bar-wrap"><div id="pct" class="pct">0%</div><div id="msg" class="msg">正在连接...</div><div class="progress-bg"><div id="fill" class="progress-fill"></div></div></div>
<div id="tip">拖拽=旋转 · 滚轮=缩放 · 右键拖=平移 · 满意后点右上角下载</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const bar=document.getElementById('bar-wrap'),pctEl=document.getElementById('pct'),msgEl=document.getElementById('msg'),fillEl=document.getElementById('fill');
function ub(p,m){pctEl.textContent=p+'%';fillEl.style.width=p+'%';if(m)msgEl.textContent=m;}

const canvas=document.getElementById('canvas');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0b1220);
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,100,60000);
camera.position.set(9000,6500,11000);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.06;controls.target.set(0,0,1500);
scene.add(new THREE.AmbientLight(0xffffff,.5));
const keyL=new THREE.DirectionalLight(0xffffff,.95);keyL.position.set(8000,12000,8000);scene.add(keyL);
const fillL=new THREE.DirectionalLight(0x93c5fd,.35);fillL.position.set(-5000,-3000,-4000);scene.add(fillL);
const grid=new THREE.GridHelper(14000,28,0x374151,0x1f2937);grid.position.y=-80;scene.add(grid);

bar.style.display='block';
ub(5,'正在下载模型 (1.3MB)...');

fetch('curved_wall_mini_manor_v3.obj',{signal:AbortSignal.timeout(120000)})
.then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})
.then(text=>{ub(40,'下载完成! 解析中 ('+(text.length>>10)+'KB)...');parseObj(text);})
.catch(e=>{
  if(e.name==='TimeoutError'){ub(0,'⏱ 加载超时 — 请刷新或检查网络');msgEl.style.color='#fbbf24';}
  else{ub(0,'❌ '+e.message);msgEl.style.color='#f87171';}
});

function parseObj(objText){
  try{
    const v=[],vn=[],faces=[];
    const lines=objText.split(/\r?\n/);
    const total=lines.length;
    for(let i=0;i<total;i++){
      const t=lines[i].trim();
      if(t.startsWith('v ')&&!t.startsWith('vn ')){const s=t.slice(2).trim().split(/\s+/);if(s.length>=3)v.push(+s[0],+s[1],+s[2]);}
      else if(t.startsWith('vn ')){const s=t.slice(3).trim().split(/\s+/);if(s.length>=3)vn.push(+s[0],+s[1],+s[2]);}
      else if(t.startsWith('f ')){const idx=[];for(const p of t.slice(2).trim().split(/\s+/)){const i=p.split('/')[0];if(i)idx.push(+i);}for(let j=1;j<idx.length-1;j++)faces.push(idx[0]-1,idx[j]-1,idx[j+1]-1);}
      if(i%3000===0&&i>0) ub(40+Math.floor(i/total*55),i+'/'+total+' 行...');
    }
    ub(95,'生成网格...');
    const pos=[],nor=[];
    for(let k=0;k<faces.length;k++){const vi=faces[k];pos.push(v[vi*3],v[vi*3+1],v[vi*3+2]);nor.push(vn[vi*3]||0,vn[vi*3+1]||1,vn[vi*3+2]||0);}
    const geom=new THREE.BufferGeometry();
    geom.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    geom.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));geom.computeVertexNormals();
    const mesh=new THREE.Mesh(geom,new THREE.MeshStandardMaterial({color:0x2e9968,roughness:.55,metalness:.05,side:THREE.DoubleSide}));
    geom.computeBoundingBox();const bb=geom.boundingBox,c=new THREE.Vector3();bb.getCenter(c);mesh.position.sub(c);
    scene.add(mesh);
    ub(100,'✅ 完成! '+(pos.length/3)+' 顶点 · '+faces.length+' 三角面');
    setTimeout(()=>{bar.style.display='none';},2000);
  }catch(e){ub(0,'❌ 解析失败: '+e.message);msgEl.style.color='#f87171';}
}

(function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);})();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

window.dl=function(file,name){
  const tip=document.getElementById('tip');
  tip.style.color='#fbbf24';tip.textContent='下载中...';
  fetch(file,{signal:AbortSignal.timeout(120000)}).then(r=>{if(!r.ok)throw new Error(r.status);return r.blob();}).then(blob=>{
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);
    tip.style.color='#4ade80';tip.textContent='✓ 已开始下载: '+name;
  }).catch(e=>{tip.style.color='#f87171';tip.textContent='❌ '+e.message;setTimeout(()=>{tip.innerHTML='拖拽=旋转 · 滚轮=缩放 · 右键拖=平移 · 满意后点右上角下载'},5000)});
};
</script>
</body></html>
