<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Manor V3 — 预览 & 下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
background:#0b1220;color:#e2e8f0;overflow:hidden;height:100vh}
#canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;z-index:0}
#canvas:active{cursor:grabbing}
.card{position:fixed;z-index:10;background:rgba(15,23,42,.88);backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 20px}
#info{top:16px;left:16px;max-width:340px}
#info h1{font-size:22px;color:#4ade80;margin-bottom:4px}
#info .sub{font-size:13px;color:#94a3b8;margin-bottom:10px}
#info .spec{font-size:13px;line-height:1.8;color:#cbd5e1}
#info .spec b{color:#4ade80}
#dl{top:16px;right:16px;display:flex;flex-direction:column;gap:10px;width:200px}
.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;
border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:15px;color:#fff;
transition:transform .15s,box-shadow .15s;font-family:inherit}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.35)}
.btn .fmt{font-size:11px;font-weight:400;opacity:.85;margin-top:1px}
.btn-obj{background:#22c55e;color:#052e16}
.btn-mtl{background:#3b82f6}
.btn-3dm{background:#f59e0b;color:#3a2606}
#tip{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
background:rgba(15,23,42,.85);color:#94a3b8;font-size:13px;padding:8px 18px;border-radius:20px;
border:1px solid rgba(255,255,255,.08)}
#status{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;
color:#fbbf24;font-size:13px;min-height:16px}
@media(max-width:640px){#info{max-width:60vw;font-size:12px}#dl{width:150px}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="card" id="info">
<h1>🌿 Mini Manor V3</h1>
<p class="sub">曲面弧形镂空围墙 · 预览 & 下载</p>
<div class="spec">
<b>414</b> 个绿色空心种植箱砌块<br>
<b>23</b> 层镜像对称 · 顶层收 1 块<br>
每块 900×220×180mm（壁厚35）<br>
全部重叠相连
</div>
</div>

<div class="card" id="dl">
<button class="btn btn-obj" onclick="dl('curved_wall_mini_manor_v3.obj','MiniManor.obj')">
⬇ OBJ 模型<span class="fmt">.obj · 1.3MB</span></button>
<button class="btn btn-mtl" onclick="dl('curved_wall_mini_manor_v3.mtl','MiniManor.mtl')">
⬇ 材质 MTL<span class="fmt">.mtl · 绿色</span></button>
<button class="btn btn-3dm" onclick="dl('curved_wall_mini_manor_v3.3dm','MiniManor.3dm')">
⬇ Rhino源文件<span class="fmt">.3dm · 11MB</span></button>
</div>

<div id="tip">拖拽=旋转 &nbsp;·&nbsp; 滚轮=缩放 &nbsp;·&nbsp; 右键拖=平移 &nbsp;·&nbsp; 满意后点右上角下载</div>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ---------- 3D 预览 ----------
const canvas=document.getElementById('canvas');
const statusEl=document.getElementById('status');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0b1220);
const camera=new THREE.PerspectiveCamera(46,innerWidth/innerHeight,100,60000);
camera.position.set(9000,6500,11000);
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=.06;controls.target.set(0,0,1500);
scene.add(new THREE.AmbientLight(0xffffff,.5));
const key=new THREE.DirectionalLight(0xffffff,.95);key.position.set(8000,12000,8000);scene.add(key);
const fill=new THREE.DirectionalLight(0x93c5fd,.35);fill.position.set(-5000,-3000,-4000);scene.add(fill);
const grid=new THREE.GridHelper(14000,28,0x374151,0x1f2937);grid.position.y=-80;scene.add(grid);

statusEl.textContent='加载模型中...';
fetch('curved_wall_mini_manor_v3.obj')
  .then(r=>{if(!r.ok)throw new Error(r.status);return r.text()})
  .then(parse)
  .catch(e=>{statusEl.textContent='加载失败: '+e.message;statusEl.style.color='#f87171';});

function parse(objText){
  const v=[],vn=[],faces=[];
  for(const line of objText.split(/\r?\n/)){
    const t=line.trim();
    if(t.startsWith('v ')&&!t.startsWith('vn ')){const s=t.slice(2).trim().split(/\s+/);if(s.length>=3)v.push(+s[0],+s[1],+s[2]);}
    else if(t.startsWith('vn ')){const s=t.slice(3).trim().split(/\s+/);if(s.length>=3)vn.push(+s[0],+s[1],+s[2]);}
    else if(t.startsWith('f ')){const idx=[];for(const p of t.slice(2).trim().split(/\s+/)){const i=p.split('/')[0];if(i)idx.push(+i);}for(let i=1;i<idx.length-1;i++)faces.push(idx[0]-1,idx[i]-1,idx[i+1]-1);}
  }
  const pos=[],nor=[];
  for(const [a,b,c] of faces){for(const vi of [a,b,c]){pos.push(v[vi*3],v[vi*3+1],v[vi*3+2]);nor.push(vn[vi*3]||0,vn[vi*3+1]||1,vn[vi*3+2]||0);}}
  const geom=new THREE.BufferGeometry();
  geom.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geom.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  geom.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({color:0x2e9968,roughness:.55,metalness:.05,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geom,mat);
  geom.computeBoundingBox();const bb=geom.boundingBox;const ctr=new THREE.Vector3();bb.getCenter(ctr);mesh.position.sub(ctr);
  scene.add(mesh);
  statusEl.textContent='';
  console.log('Ready: '+(v.length/3)+' verts');
}
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// ---------- 下载 ----------
function dl(file,name){
  statusEl.style.color='#fbbf24';statusEl.textContent='下载中: '+file+' ...';
  fetch(file).then(r=>{if(!r.ok)throw new Error(r.status);return r.blob();}).then(blob=>{
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
    URL.revokeObjectURL(url);
    statusEl.style.color='#4ade80';statusEl.textContent='✓ 已开始下载: '+name;
  }).catch(e=>{statusEl.style.color='#f87171';statusEl.textContent='下载失败: '+e.message;});
}
</script>
</body></html>
