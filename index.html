<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Manor V3 — 预览 & 下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
background:#0b1220;color:#e2e8f0;overflow:hidden;height:100vh}
#canvas{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;z-index:0}
#canvas:active{cursor:grabbing}
.card{position:fixed;z-index:10;background:rgba(15,23,42,.88);backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 20px}
#info{top:16px;left:16px;max-width:340px}
#info h1{font-size:22px;color:#4ade80;margin-bottom:4px}
#info .sub{font-size:13px;color:#94a3b8;margin-bottom:10px}
#info .spec{font-size:13px;line-height:1.8;color:#cbd5e1} #info .spec b{color:#4ade80}
#dl{top:16px;right:16px;display:flex;flex-direction:column;gap:10px;width:200px}
.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;border-radius:10px;
border:none;cursor:pointer;font-weight:600;font-size:15px;color:#fff;
transition:transform .15s,box-shadow .15s;font-family:inherit}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.35)}
.btn .fmt{font-size:11px;font-weight:400;opacity:.85;margin-top:1px}
.btn-obj{background:#22c55e;color:#052e16}.btn-mtl{background:#3b82f6}.btn-3dm{background:#f59e0b;color:#3a2606}

/* 永久状态栏 — 即使 JS 崩溃也可见 */
#status-bar{position:fixed;z-index:20;top:50%;left:50%;transform:translate(-50%,-50%);
background:rgba(15,23,42,.95);padding:28px 36px;border-radius:16px;
border:2px solid #4ade80;text-align:center;min-width:340px;
box-shadow:0 0 40px rgba(74,222,128,.15);pointer-events:none}
#status-bar.ok{border-color:#4ade80}
#status-bar.err{border-color:#f87171}
#status-bar .sb-icon{font-size:36px;display:block;margin-bottom:8px}
#status-bar .sb-title{font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
#status-bar .sb-detail{font-size:13px;color:#94a3b8;line-height:1.6}
#status-bar.hidden{display:none}

#tip{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
background:rgba(15,23,42,.85);color:#94a3b8;font-size:13px;padding:8px 18px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>

<!-- 永远显示的状态面板 -->
<div id="status-bar" class="">
<div class="sb-icon">⏳</div>
<div class="sb-title" id="sb-title">正在加载模型...</div>
<div class="sb-detail" id="sb-detail">请稍候，正在下载并解析 OBJ 文件 (约 3.5MB)</div>
</div>

<canvas id="canvas"></canvas>

<div class="card" id="info">
<h1>🌿 Mini Manor V5</h1>
<p class="sub">曲面弧形镂空围墙（竖向分柱堆叠）· 预览 &amp; 下载</p>
<div class="spec"><b>662</b> 个绿色空心种植箱砌块<br><b>+662</b> 箱内亮绿种植体<br><b>17</b> 柱·中心满高 <b>23</b> 层·前端阶梯收窄<br>每块 900×220×180mm（壁厚35）<br>C形开口朝前 · 全部重叠相连</div>
</div>

<div class="card" id="dl">
<button class="btn btn-obj" onclick="dl('curved_wall_mini_manor_v5.obj','MiniManor_v5.obj')">
⬇ OBJ 模型<span class="fmt">.obj · 3.5MB</span></button>
<button class="btn btn-mtl" onclick="dl('curved_wall_mini_manor_v5.mtl','MiniManor_v5.mtl')">
⬇ 材质 MTL<span class="fmt">.mtl · 双材质</span></button>
<button class="btn btn-3dm" onclick="dl('curved_wall_mini_manor_v5.3dm','MiniManor_v5.3dm')">
⬇ Rhino源文件<span class="fmt">.3dm · 27MB</span></button>
</div>

<div id="tip">拖拽=旋转 · 滚轮=缩放 · 右键拖=平移 · 满意后点右上角下载</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const sb = document.getElementById('status-bar');
const sbTitle = document.getElementById('sb-title');
const sbDetail = document.getElementById('sb-detail');

function showStatus(icon, title, detail, isError) {
  sb.className = isError ? 'err' : 'ok';
  sb.querySelector('.sb-icon').textContent = icon;
  sbTitle.textContent = title;
  sbDetail.textContent = detail || '';
  sb.classList.remove('hidden');
}
function hideStatus() { sb.classList.add('hidden'); }

// --- 场景初始化 ---
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1220);

const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 100, 60000);
camera.position.set(9000, 6500, 11000);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.target.set(0, 0, 1500);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const keyL = new THREE.DirectionalLight(0xffffff, 0.95);
keyL.position.set(8000, 12000, 8000);
scene.add(keyL);
const fillL = new THREE.DirectionalLight(0x93c5fd, 0.35);
fillL.position.set(-5000, -3000, -4000);
scene.add(fillL);
const grid = new THREE.GridHelper(14000, 28, 0x374151, 0x1f2937);
grid.position.y = -80;
scene.add(grid);

// --- 动画循环 ---
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// --- 用官方 OBJLoader 加载模型 ---
showStatus('⏳', '正在下载模型...', '下载 OBJ 文件 (约 3.5MB)，请稍候…');

const loader = new OBJLoader();

fetch('curved_wall_mini_manor_v5.obj', { signal: AbortSignal.timeout(120000) })
.then(r => {
  if (!r.ok) throw new Error('HTTP ' + r.status + ': 文件不存在或服务器错误');
  return r.text();
})
.then(text => {
  showStatus('⏳', '解析模型中...', '已下载 ' + (text.length >> 10) + ' KB，正在构建几何体…');

  // 用官方 loader 解析
  const object = loader.parse(text);

  // 遍历所有 mesh，按网格名分色并居中
  let totalVerts = 0, totalFaces = 0;
  object.traverse(child => {
    if (child.isMesh) {
      const isFoliage = /foliage/i.test(child.name || '');
      child.material = new THREE.MeshStandardMaterial({
        color: isFoliage ? 0x339e61 : 0x2e9968,
        roughness: isFoliage ? 0.7 : 0.55,
        metalness: 0.05,
        side: THREE.DoubleSide
      });
      const geo = child.geometry;
      if (geo.attributes.position) {
        totalVerts += geo.attributes.position.count;
        totalFaces += (geo.index ? geo.index.count : geo.attributes.position.count) / 3;
      }
    }
  });

  // 居中整个模型
  const box = new THREE.Box3().setFromObject(object);
  const center = box.getCenter(new THREE.Vector3());
  object.position.sub(center);
  scene.add(object);

  showStatus(
    '✅',
    '模型加载完成！',
    totalVerts.toLocaleString() + ' 顶点 · ' + Math.floor(totalFaces).toLocaleString() + ' 三角面\n可拖拽旋转、滚轮缩放'
  );

  // 3 秒后隐藏状态栏
  setTimeout(hideStatus, 3500);
})
.catch(err => {
  console.error('[MiniManor]', err);
  const msg = err.name === 'TimeoutError'
    ? '加载超时（>120s）。文件较大，建议刷新重试或检查网络。'
    : (err.message || String(err));
  showStatus('❌', '加载失败', msg, true);
});

// --- 全局下载函数（供 onclick 调用）---
window.dl = function(file, name) {
  const tip = document.getElementById('tip');
  tip.style.color = '#fbbf24';
  tip.textContent = '下载中…';
  fetch(file, { signal: AbortSignal.timeout(120000) })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.blob();
    })
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
      tip.style.color = '#4ade80';
      tip.textContent = '✓ 已开始下载: ' + name;
    })
    .catch(e => {
      tip.style.color = '#f87171';
      tip.textContent = '❌ 下载失败: ' + e.message;
      setTimeout(() => {
        tip.innerHTML = '拖拽=旋转 · 滚轮=缩放 · 右键拖=平移 · 满意后点右上角下载';
      }, 5000);
    });
};
</script>
</body></html>
