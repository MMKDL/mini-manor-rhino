<html lang="zh">
<head>
<meta charset="utf-8">

<title>Mini Manor V3 — 模型下载</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e2e8f0;
min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.wrap{width:100%;max-width:680px}
h1{font-size:28px;font-weight:700;color:#4ade80;margin-bottom:6px;text-align:center}
.sub{text-align:center;color:#94a3b8;font-size:15px;margin-bottom:8px}
.spec{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
border-radius:12px;padding:16px 20px;margin:20px 0;font-size:14px;line-height:1.9;color:#cbd5e1}
.spec b{color:#4ade80}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:18px;border-radius:12px;border:none;cursor:pointer;font-weight:600;font-size:16px;color:#fff;
transition:transform .15s,box-shadow .15s;font-family:inherit}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.btn .fmt{font-size:12px;font-weight:400;opacity:.85;margin-top:2px}
.btn-obj{background:#22c55e;color:#052e16}
.btn-mtl{background:#3b82f6}
.btn-3dm{background:#f59e0b;color:#3a2606}
.btn-prev{background:#8b5cf6}
.btn-prev-a{background:#8b5cf6;text-decoration:none}
.full{grid-column:1/-1}
.tip{margin-top:22px;font-size:13px;color:#64748b;text-align:center;line-height:1.7}
.tip code{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;color:#e2e8f0}
#status{margin-top:14px;font-size:13px;color:#fbbf24;min-height:18px}
hr{border:none;border-top:1px solid rgba(255,255,255,.08);margin:24px 0}
</style>
</head>
<body>
<div class="wrap">
<h1>🌿 Mini Manor V3</h1>
<p class="sub">曲面弧形镂空围墙 · 3D 模型下载</p>

<div class="spec">

每块 900×220×180mm（壁厚35，内腔可见）<br>
全部重叠相连 &nbsp;·&nbsp; 顶层收成 1 块
</div>

<div class="btns">
<button class="btn btn-obj full" onclick="dl('curved_wall_mini_manor_v3.obj','MiniManor.obj')">
⬇ 下载 OBJ 模型<span class="fmt">.obj · 1.3 MB · Rhino/Blender 导入</span></button>

<button class="btn btn-mtl" onclick="dl('curved_wall_mini_manor_v3.mtl','MiniManor.mtl')">

<div id="status"></div>

<hr>
<p class="tip">
<b>使用方式</b><br>
下载 <code>OBJ</code> 后 → Rhino 8 中 <code>文件 → 导入</code> 选 OBJ（MTL 自动加载绿色）<br>
或下载 <code>3DM</code> 直接双击用 Rhino 打开（保留图层/参数化信息）
</p>
</div>

<script>
function dl(file, name){
  const st=document.getElementById('status');
  st.style.color='#fbbf24'; st.textContent='下载中: '+file+' ...';
  fetch(file).then(r=>{
    if(!r.ok) throw new Error(r.status);
    return r.blob();
  }).then(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=name; document.body.appendChild(a);
    a.click(); a.remove();
    URL.revokeObjectURL(url);
    st.style.color='#4ade80'; st.textContent='✓ 已开始下载: '+name;
  }).catch(e=>{
    st.style.color='#f87171'; st.textContent='下载失败: '+e.message+' — 请右键链接另存为';
  });
}
</script>
</body></html>
